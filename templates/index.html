<!DOCTYPE html>
<html>
<head>
    <title>Soil Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f7f5;
        }

        h1 {
            color: #2f4f4f;
        }

        .card {
            background: white;
            padding: 24px;
            margin-bottom: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ddd;
        }

        th {
            background: #e8f0ea;
        }
    </style>
</head>

<body>
    <h1>Soil Health Dashboard</h1>

    <div class="card">
        <p>Number of samples: {{ sample_count }}</p>
        <p>Average moisture: {{ avg_moisture }}</p>
    </div>

    <div class="card">
        <h2>Interactive Chart</h2>
        {{ chart | safe }}
    </div>

    <div class="card">
        <h2>Data Preview</h2>
        {{ table | safe }}
    </div>
</body>
</html>
